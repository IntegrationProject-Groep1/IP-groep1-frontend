name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"] # Hij luistert hier naar de exacte naam van Bestand 1
    types:
      - completed

jobs:
  build-and-push:
    name: Build and Push Docker Image
    # Checkt of het geslaagd is of niet en of het op de branche 'main' of 'prod' gebeurt.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' ||
       github.event.workflow_run.head_branch == 'prod' ||
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          #  Pakt de code van de exacte commit die net is goedgekeurd.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Lowercase repo name
        id: repo_name
        run: echo "value=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.value }}:latest
            ghcr.io/${{ steps.repo_name.outputs.value }}:${{ github.event.workflow_run.head_branch }}
