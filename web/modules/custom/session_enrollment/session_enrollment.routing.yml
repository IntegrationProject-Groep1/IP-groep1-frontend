session_enrollment.enroll:
  path: '/sessions/enroll'
  defaults:
    _form: '\Drupal\session_enrollment\Form\SessionEnrollForm'
    _title: 'Enroll in sessions'
  requirements:
    _role: 'authenticated'

session_enrollment.confirmation:
  path: '/sessions/enroll/confirmation'
  defaults:
    _controller: '\Drupal\session_enrollment\Controller\EnrollmentConfirmationController::page'
    _title: 'Enrollment confirmed'
  requirements:
    _role: 'authenticated'

session_enrollment.my_sessions:
  path: '/sessions/my'
  defaults:
    _controller: '\Drupal\session_enrollment\Controller\MySessionsController::page'
    _title: 'My Sessions'
  requirements:
    _role: 'authenticated'

session_enrollment.unenroll:
  path: '/sessions/unenroll/{session_id}'
  defaults:
    _controller: '\Drupal\session_enrollment\Controller\UnenrollController::unenroll'
    _title: 'Uitschrijven voor sessie'
  requirements:
    _role: 'authenticated'
    session_id: '.+'
