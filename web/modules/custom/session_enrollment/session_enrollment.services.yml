services:
  session_enrollment.planning_connection_subscriber:
    class: Drupal\session_enrollment\EventSubscriber\PlanningConnectionSubscriber
    tags:
      - { name: event_subscriber }

  session_enrollment.enrollment_service:
    class: Drupal\session_enrollment\Service\SessionEnrollmentService
    arguments:
      - '@logger.factory'
      - '@rabbitmq_sender.calendar_invite_sender'
      - '@rabbitmq_sender.user_registered_sender'
