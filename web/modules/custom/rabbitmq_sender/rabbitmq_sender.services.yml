  rabbitmq_sender.user_unregistered_sender:
    class: Drupal\rabbitmq_sender\UserUnregisteredSender
    arguments:
      - '@?rabbitmq_sender.rabbitmq_client'

  rabbitmq_sender.company_member_removed_sender:
    class: Drupal\rabbitmq_sender\CompanyMemberRemovedSender
    arguments:
      - '@?rabbitmq_sender.rabbitmq_client'
    
  rabbitmq_sender.monitoring_log_sender:
    class: Drupal\rabbitmq_sender\MonitoringLogSender
