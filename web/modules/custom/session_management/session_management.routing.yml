session_management.admin:
  path: '/session/admin'
  defaults:
    _controller: '\Drupal\session_management\Controller\AdminSessionsController::page'
    _title: 'Manage Sessions'
  requirements:
    _permission: 'administer site configuration'

session_management.create:
  path: '/session/create'
  defaults:
    _form: '\Drupal\session_management\Form\SessionForm'
    _title: 'Create a session'
  requirements:
    _permission: 'administer site configuration'

session_management.edit:
  path: '/session/{session_id}/edit'
  defaults:
    _form: '\Drupal\session_management\Form\SessionEditForm'
    _title: 'Edit session'
  requirements:
    _permission: 'administer site configuration'
    session_id: '[a-zA-Z0-9\-_]+'

session_management.delete:
  path: '/session/{session_id}/delete'
  defaults:
    _form: '\Drupal\session_management\Form\SessionDeleteForm'
    _title: 'Delete session'
  requirements:
    _permission: 'administer site configuration'
    session_id: '[a-zA-Z0-9\-_]+'

session_management.confirmation:
  path: '/session/confirmation'
  defaults:
    _controller: '\Drupal\session_management\Controller\SessionConfirmationController::page'
    _title: 'Session created'
  requirements:
    _permission: 'access content'

session_management.end:
  path: '/session/end'
  defaults:
    _form: '\Drupal\session_management\Form\SessionEndForm'
    _title: 'End a session'
  requirements:
    _permission: 'administer site configuration'

session_management.admin:
  path: '/session/admin'
  defaults:
    _controller: '\Drupal\session_management\Controller\AdminSessionsController::page'
    _title: 'Session Admin'
  requirements:
    _permission: 'administer site configuration'

session_management.session_enrollees:
  path: '/session/{session_id}/enrollees'
  defaults:
    _controller: '\Drupal\session_management\Controller\AdminSessionEnrolleesController::page'
    _title: 'Session Enrollees'
  requirements:
    _permission: 'administer site configuration'
    session_id: '[a-zA-Z0-9\-_]+'

session_management.remove_enrollee:
  path: '/session/{session_id}/enrollees/{user_uuid}/remove'
  defaults:
    _form: '\Drupal\session_management\Form\RemoveEnrolleeForm'
    _title: 'Remove from session'
  requirements:
    _permission: 'administer site configuration'
    session_id: '[a-zA-Z0-9\-_]+'
    user_uuid: '[a-zA-Z0-9\-_]+'
