# Service container definitions for registration orchestration and payload mapping.
services:
  rabbitmq_sender.new_registration_sender:
    class: Drupal\rabbitmq_sender\NewRegistrationSender

  registration_form.crm_payload_builder:
    class: Drupal\registration_form\Service\RegistrationCrmPayloadBuilder

  registration_form.registration_service:
    class: Drupal\registration_form\Service\RegistrationService
    arguments:
      - '@logger.factory'
      - '@entity_type.manager'
      - '@rabbitmq_sender.new_registration_sender'
      - '@registration_form.crm_payload_builder'
