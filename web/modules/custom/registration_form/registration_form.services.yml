# Service container definitions for registration orchestration and payload mapping.
services:
  rabbitmq_sender.identity_service_client:
    class: Drupal\rabbitmq_sender\IdentityServiceClient

  registration_form.crm_payload_builder:
    class: Drupal\registration_form\Service\RegistrationCrmPayloadBuilder

  registration_form.registration_service:
    class: Drupal\registration_form\Service\RegistrationService
    arguments:
      - '@logger.factory'
      - '@entity_type.manager'
      - '@rabbitmq_sender.new_registration_sender'
      - '@registration_form.crm_payload_builder'
      - '@rabbitmq_sender.identity_service_client'
      - '@rabbitmq_sender.user_created_sender'

  registration_form.company_invitation_service:
    class: Drupal\registration_form\Service\CompanyInvitationService
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@rabbitmq_sender.company_invitation_sender'
